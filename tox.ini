[tox]
envlist = py3{10-14}-{PySide6,core},py314t-core
isolated_build = true

[tool:pytest]
addopts = --verbose

[testenv]
labels =
    test
dependency_groups = test
commands =  pytest --basetemp={envtmpdir} {env:pytest_args:} {posargs}


[testenv:py3{10-}-PySide6]
dependency_groups = test-gui
labels =
    test

extras = gui
whitelist_externals=
    python
    pytest
download=true

passenv =
    XAUTHORITY
    DISPLAY
    LocalAppData
set_env =
    QT_QPA_PLATFORM=offscreen



commands =  pytest --basetemp={envtmpdir} {env:pytest_args:} {posargs}

; ======================== tests ========================
[testenv:docs]
labels =
    build
    docs
dependency_groups = docs
commands=
    sphinx-build {env:sphinx_args:-W -b html -d "{envtmpdir}/doctrees" docs  "{temp_dir}/docs/html"}

[testenv:mypy]
labels =
    lint
    correctness

dependency_groups = type-checking
skip_install=True
setenv = MYPY_CACHE_DIR = {temp_dir}/.mypy_cache
commands = mypy {posargs: -p speedwagon_uiucprescon}

[testenv:flake8]
description = check the code style
dependency_groups = code-style
labels =
    lint
    style

skip_install=True
commands = flake8 {posargs: speedwagon_uiucprescon}

[testenv:pylint]
description = check the code style
labels =
    lint
    style
    correctness
dependency_groups = lint
skip_install=True
commands =  pylint {posargs: speedwagon_uiucprescon} --disable import-error

[testenv:doctest]
labels =
    docs
    tests
    correctness
skip_install = true
dependency_groups = dev
commands = python -m sphinx -b doctest docs "{envtmpdir}/build/docs" -d "{envtmpdir}/build/docs/doctrees"

[testenv:pydocstyle]
labels =
    docs
    lint
    style
skip_install = true
dependency_groups = code-style
commands =
    pydocstyle {posargs: {toxinidir}/speedwagon_uiucprescon}

[testenv:bandit]
labels =
    lint
    security
skip_install = true
dependency_groups = security
commands =
    bandit {posargs: --recursive {toxinidir}/speedwagon_uiucprescon}

[testenv:ruff]
labels =
    lint
    style
    correctness
skip_install = true
dependency_groups = lint
commands =
    ruff check {posargs: {toxinidir}/speedwagon_uiucprescon}
